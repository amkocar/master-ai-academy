<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow,noarchive"/>
<title>Master AI Academy — Access Granted</title>
<style>
:root{--cyan:#6ee7ff;--violet:#9b76ff;--pink:#e047ff;--text:#f3f8ff;--muted:#9fb5d3}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:
radial-gradient(circle at 25% 20%,rgba(110,231,255,.18),transparent 38%),
radial-gradient(circle at 80% 70%,rgba(155,118,255,.18),transparent 40%),
linear-gradient(180deg,#050b14,#02040a);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
.card{width:min(620px,92vw);border:1px solid rgba(110,231,255,.28);border-radius:26px;background:rgba(8,18,34,.84);box-shadow:0 0 70px rgba(110,231,255,.12);padding:34px;text-align:center;backdrop-filter:blur(18px)}
.logo{width:70px;height:70px;border-radius:22px;margin:0 auto 18px;background:conic-gradient(from 180deg,var(--cyan),var(--violet),var(--pink),var(--cyan));display:grid;place-items:center;box-shadow:0 0 34px rgba(110,231,255,.35);font-weight:950;font-size:34px}
h1{margin:0 0 10px;font-size:34px;letter-spacing:-.04em}p{margin:0;color:var(--muted);line-height:1.6}
.btn{display:inline-flex;margin-top:24px;padding:14px 22px;border-radius:16px;background:linear-gradient(90deg,var(--cyan),var(--violet));color:white;text-decoration:none;font-weight:900;box-shadow:0 0 30px rgba(110,231,255,.22)}
.err{border-color:rgba(255,139,157,.4)}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">M</div>
  <h1 id="title">Checking access…</h1>
  <p id="msg">Please wait while we unlock Master AI Academy.</p>
  <a class="btn" id="btn" href="/academy.html" style="display:none">Enter Academy</a>
</div>
<script>
(function(){
  const VALID_KEY = "maa_h9O7pNs09Mxe-ERwmDo3hbns99rcGQ53L_QOlwezkz0";
  const params = new URLSearchParams(window.location.search);
  const key = params.get("key");
  const title = document.getElementById("title");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");
  const card = document.getElementById("card");

  if (key === VALID_KEY) {
    localStorage.setItem("maa_paid_access_v1", "active");
    localStorage.setItem("maa_access_granted_at", String(Date.now()));
    title.textContent = "Access granted";
    msg.textContent = "Your Master AI Academy access is now active in this browser for 31 days.";
    btn.style.display = "inline-flex";
    setTimeout(() => window.location.replace("/academy.html"), 900);
  } else {
    card.classList.add("err");
    title.textContent = "Access not verified";
    msg.textContent = "This access link is invalid. Please use the official Whop checkout.";
    btn.textContent = "Get Access";
    btn.href = "https://whop.com/checkout/plan_jO0TvvuJFmOlT";
    btn.style.display = "inline-flex";
  }
})();
</script>
</body>
</html>
